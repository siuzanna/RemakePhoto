<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RemakePhoto</title>
  <style>
    :root {
      color-scheme: light dark;
      --background: #f7f5f2;
      --text: #161616;
      --muted: #5d5d5d;
      --accent: #6b5cff;
      --panel: #ffffff;
      --border: #dedbd4;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --background: #111111;
        --text: #f3f3f3;
        --muted: #b8b8b8;
        --panel: #1c1c1c;
        --border: #333333;
      }
    }

    body {
      margin: 0;
      background: var(--background);
      color: var(--text);
      font: 16px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 64px 24px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(34px, 8vw, 56px);
      line-height: 1;
      letter-spacing: 0;
    }

    p {
      color: var(--muted);
      max-width: 620px;
    }

    a {
      color: var(--accent);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main>
    <h1>RemakePhoto</h1>
    <p>Use reference images while taking photos, then compare and save the shot you want.</p>
    <p><a href="privacy.html">Privacy Policy</a> · <a href="terms.html">Terms of Use</a></p>
  </main>
</body>
</html>
